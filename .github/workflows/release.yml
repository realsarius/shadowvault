name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-15-intel
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            target: ''
          - platform: ubuntu-22.04
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --list 'v*' --sort=-version:refname | awk -v current="${current_tag}" '$0 != current { print; exit }')"

          if [[ -n "${previous_tag}" ]]; then
            log_range="${previous_tag}..${current_tag}"
            compare_text="${previous_tag} -> ${current_tag}"
          else
            log_range="${current_tag}"
            compare_text="initial -> ${current_tag}"
          fi

          tmp_dir="$(mktemp -d)"
          features_file="${tmp_dir}/features.txt"
          fixes_file="${tmp_dir}/fixes.txt"
          refactor_file="${tmp_dir}/refactor.txt"
          ci_file="${tmp_dir}/ci.txt"
          docs_file="${tmp_dir}/docs.txt"
          other_file="${tmp_dir}/other.txt"
          body_file="${tmp_dir}/body.md"
          touch "${features_file}" "${fixes_file}" "${refactor_file}" "${ci_file}" "${docs_file}" "${other_file}"

          commit_count=0
          while IFS=$'\x1f' read -r short_hash subject || [[ -n "${short_hash:-}" ]]; do
            [[ -z "${short_hash}" ]] && continue
            commit_count=$((commit_count + 1))

            normalized_subject="$(printf '%s' "${subject}" | tr '[:upper:]' '[:lower:]')"
            raw_type="${normalized_subject%%:*}"
            raw_type="${raw_type%%(*}"
            raw_type="${raw_type%%!*}"

            scope=""
            prefix="${normalized_subject%%:*}"
            if [[ "${prefix}" == *"("* ]]; then
              scope="${prefix#*(}"
              scope="${scope%)*}"
            fi
            scope_suffix=""
            if [[ -n "${scope}" ]]; then
              scope_suffix=" (${scope})"
            fi

            case "${raw_type}" in
              feat) message="Add feature updates${scope_suffix}" ;;
              fix) message="Fix issues and edge cases${scope_suffix}" ;;
              refactor|perf) message="Refactor and performance improvements${scope_suffix}" ;;
              ci|build|chore) message="CI, build, and tooling updates${scope_suffix}" ;;
              docs|test) message="Documentation and test updates${scope_suffix}" ;;
              *) message="General maintenance updates${scope_suffix}" ;;
            esac

            line="- \`${short_hash}\` ${message}"
            case "${raw_type}" in
              feat) echo "${line}" >> "${features_file}" ;;
              fix) echo "${line}" >> "${fixes_file}" ;;
              refactor|perf) echo "${line}" >> "${refactor_file}" ;;
              ci|build|chore) echo "${line}" >> "${ci_file}" ;;
              docs|test) echo "${line}" >> "${docs_file}" ;;
              *) echo "${line}" >> "${other_file}" ;;
            esac
          done < <(git log --pretty=format:'%h%x1f%s' "${log_range}")

          {
            echo "## ShadowVault ${current_tag}"
            echo
            echo "- Compare range: \`${compare_text}\`"
            echo "- Total commits: ${commit_count}"
            echo
          } > "${body_file}"

          render_section() {
            local title="$1"
            local file="$2"
            if [[ -s "${file}" ]]; then
              echo "### ${title}" >> "${body_file}"
              cat "${file}" >> "${body_file}"
              echo >> "${body_file}"
            fi
          }

          render_section "Features" "${features_file}"
          render_section "Fixes" "${fixes_file}"
          render_section "Refactor / Performance" "${refactor_file}"
          render_section "CI / Build / Chore" "${ci_file}"
          render_section "Docs / Tests" "${docs_file}"
          render_section "Other" "${other_file}"

          if [[ ! -s "${features_file}" && ! -s "${fixes_file}" && ! -s "${refactor_file}" && ! -s "${ci_file}" && ! -s "${docs_file}" && ! -s "${other_file}" ]]; then
            echo "_No commits found in this range._" >> "${body_file}"
          fi

          {
            echo "release_body<<EOF"
            cat "${body_file}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          rm -rf "${tmp_dir}"

      - name: Install OpenSSL (macOS x86_64 cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV

      - name: Verify signing key is set
        shell: bash
        run: |
          if [[ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set. latest.json will not be generated and the in-app updater will not work."
            exit 1
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          SHADOWVAULT_GUI: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ONEDRIVE_CLIENT_ID: ${{ secrets.ONEDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          DROPBOX_CLIENT_ID: ${{ secrets.DROPBOX_CLIENT_ID }}
          DROPBOX_CLIENT_SECRET: ${{ secrets.DROPBOX_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ShadowVault ${{ github.ref_name }}'
          releaseBody: ${{ steps.release_notes.outputs.release_body }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  create-updater-json:
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download release artifacts
        run: |
          mkdir -p artifacts
          cd artifacts
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.app.tar.gz" \
            --pattern "*.AppImage" \
            --pattern "*-setup.exe" \
            --skip-existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign artifacts and build latest.json
        run: |
          set -euo pipefail
          cd artifacts

          # Write private key to temp file
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > /tmp/shadowvault.key
          trap 'rm -f /tmp/shadowvault.key' EXIT

          # Sign every updater artifact that was downloaded
          for f in *.app.tar.gz *.AppImage *-setup.exe; do
            [ -f "$f" ] || continue
            echo "Signing $f..."
            npm run tauri -- signer sign \
              -k /tmp/shadowvault.key \
              -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              "$f"
          done

          # Create latest.json
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          node - <<'JSEOF'
          const { readFileSync, readdirSync, writeFileSync } = require('fs');
          const version   = process.env.VERSION;
          const baseUrl   = process.env.BASE_URL;
          const files     = readdirSync('.');

          const read = (name) => readFileSync(name, 'utf8').trim();
          const find = (suffix) => files.find(f => f.endsWith(suffix));

          const platforms = {};

          const macX64    = find('_x64.app.tar.gz');
          const macArm    = find('_aarch64.app.tar.gz');
          const linuxAI   = find('.AppImage');
          const winNsis   = find('-setup.exe');

          if (macX64   && files.includes(macX64   + '.sig')) platforms['darwin-x86_64']   = { signature: read(macX64   + '.sig'), url: `${baseUrl}/${macX64}` };
          if (macArm   && files.includes(macArm   + '.sig')) platforms['darwin-aarch64']  = { signature: read(macArm   + '.sig'), url: `${baseUrl}/${macArm}` };
          if (linuxAI  && files.includes(linuxAI  + '.sig')) platforms['linux-x86_64']    = { signature: read(linuxAI  + '.sig'), url: `${baseUrl}/${linuxAI}` };
          if (winNsis  && files.includes(winNsis  + '.sig')) platforms['windows-x86_64']  = { signature: read(winNsis  + '.sig'), url: `${baseUrl}/${winNsis}` };

          if (!Object.keys(platforms).length) {
            console.error('No signed artifacts found — aborting.');
            process.exit(1);
          }

          const json = JSON.stringify({ version, notes: `ShadowVault v${version}`, pub_date: new Date().toISOString(), platforms }, null, 2);
          writeFileSync('latest.json', json);
          console.log('latest.json:\n' + json);
          JSEOF
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VERSION: ${{ github.ref_name }}
          BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

      - name: Upload latest.json to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/latest.json \
            --clobber \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
